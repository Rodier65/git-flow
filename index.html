  <h1>Git Flow</h1>
  <p>Git Flow is a branching model for Git, designed to help manage releases and features in a structured way.</p>
  
  <h2>Key Concepts</h2>
  <ul>
    <li><strong>Main Branches:</strong> <code>main</code> (or <code>master</code>) and <code>develop</code></li>
    <li><strong>Supporting Branches:</strong> Feature branches, Release branches, Hotfix branches</li>
  </ul>
